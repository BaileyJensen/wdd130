<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130| Submit Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<header>
    <h1>
        WDD 130| Submit Form
    </h1>
</header>

<body>

    <form>
        <fieldset>
            <legend> Contact Info</legend>
            <div class="form-item column2">
                <label for="fullname">Fullname:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2">
                <label for="email">Email Address:</label>
                <input type="text" id="email" name="email">
            </div>
        </fieldset>
        <fieldset>
            <legend>Questions</legend>
            <div class="form-item column1">
                <label for="favbrowser">Select your Favorite Browser: </label>
                <select name="favbrowser" id="quantity">
                    <option value="safari">Safari</option>
                    <option value="google">Google</option>
                    <option value="bing"> Bing</option>
                </select>
            </div>
            <div class="form-item column1">
                <label><input type="checkbox" id="pet" name="pet">Do you have a pet?</label>
            </div>
            <div class="form-item column5">
                <label for="message">List the places you have lived</label>
                <textarea id="feedback" name="feedback" rows="3"></textarea>
            </div>
            </select>
        </fieldset>
        <footer>
            <button type="submit">Submit Poll</button>

        </footer>
    </form>

</html>
