<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact us | Rapid River Rascals</title>
    <meta name="author" content="Bailey Jensen">
    <meta name="description"
      content="Contact Rapid River Rascals for rafting, trip info, questions,and customer support">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images/wwr-logo.jpg" alt="Rapid River Rascals Logo">
        </div>
        <nav>
            <ul class="navigation">
                <li> <a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li> <a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="info">
            <h1>Rapid River Rascals </h1>
            <ul>
                <li> 123 Main River Street</li>
                <li> Paradise, Utah</li>
                <li> +1 800 800 8008</li>
                <li> info@rapidriverrascals.com </li>

            </ul>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d5246.593288482481!2d-109.53901479506676!3d38.565037496281725!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1780697622961!5m2!1sen!2sus"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
                <form>
                    <label for="name">Name: </label>
                    <input type="text" id="name" name="name">
                    <label for="email">Email Address: </label>
                    <input type="email" id="email" name="email">
                    <p> Message Purpose</p>
                    <div class="radio-group">
                        <label><input [type="radio" ] name=purpose>General Inquiry</label>
                        <label><input [type="radio" ] name=purpose>Reservation Question</label>
                        <label><input [type="radio" ] name=purpose>Website Suggestion</label>

                    </div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="3"></textarea>
                    <label></label>
                    <label><input type="checkbox" id="newsletter" name="subscribe">Subscribe me to
                        the
                        newsletter!</label>
                    <div class="button-row">
                        <button type="submit">Get in touch</button>
                    </div>
                </form>

            </div>
        </div>
        <section>
            <h2> We are here to serve you!</h2>
            <div class="employee">
                <figure>
                    <img src="images/bailey.jpg" alt="Employee:Bailey">
                    <figcaption> Bailey, been on 207 trips!</figcaption>
                </figure>
                <figure>
                    <img src="images/garyn.jpg" alt="Employee:Garyn">
                    <figcaption> Garyn, been on 190 trips!</figcaption>
                </figure>
                <figure>
                    <img src="images/mccall.jpg" alt="Employee:Mccall">
                    <figcaption> McCall, been on 2 trips!</figcaption>
                </figure>

            </div>
        </section>
    </main>
    <footer>
        <p> © 2026 River Rafting Rascals | Bailey Jensen</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com/">
                <img class="socialmedia img" src="images/facebook.jpg" alt="Facebook Logo">
            </a>
            <a href="https://www.instagram.com/">
                <img class="socialmedia img" src="images/instagram.jpg" alt="Instagram Logo">
            </a>
            <a href="https://www.youtube.com/">
                <img class="socialmedia img" src="images/youtube.jpg" alt="YouTube Logo">
            </a>
        </nav>
    </footer>
</body>

</html>
